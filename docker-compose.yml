services:
  mysql:
    image: mysql:8.0
    container_name: accountant_hub_mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: accountant_hub
    volumes:
      - accountant_hub_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    image: php:8.4-cli
    container_name: accountant_hub_api
    working_dir: /app
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: accountant_hub
      DB_USERNAME: root
      DB_PASSWORD: root
      SESSION_DRIVER: file
      CACHE_STORE: file
    depends_on:
      mysql:
        condition: service_healthy
    command: >
      bash -c "docker-php-ext-install pdo_mysql > /dev/null 2>&1
      && php artisan serve --host=0.0.0.0 --port=8000"

volumes:
  accountant_hub_mysql_data:
